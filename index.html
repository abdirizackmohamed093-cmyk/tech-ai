 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech - AI Assistant</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b141a; /* Dark WhatsApp background */
            color: #e9edef;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Bar */
        header {
            background-color: #202c33;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2f3b43;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .avatar {
            font-size: 24px;
        }

        .app-info h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .app-info p {
            font-size: 12px;
            color: #8696a0;
        }

        /* Chat Area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: linear-gradient(rgba(11, 20, 26, 0.95), rgba(11, 20, 26, 0.95)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* Subtle pattern */
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 85%;
        }

        /* Tech's messages (Left Side) */
        .message.tech {
            align-self: flex-start;
        }

        .message.tech .bubble {
            background-color: #202c33;
            color: #e9edef;
            border-radius: 12px 12px 12px 0px;
        }

        /* Abdi's messages (Right Side) */
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.user .bubble {
            background-color: #005c4b; /* Deep blue-green WhatsApp right bubble */
            color: #e9edef;
            border-radius: 12px 12px 0px 12px;
        }

        .bubble {
            padding: 10px 14px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
        }

        /* Input Area at Bottom */
        footer {
            background-color: #202c33;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #message-input {
            flex: 1;
            background-color: #2a3942;
            border: none;
            color: #e9edef;
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
        }

        #message-input::placeholder {
            color: #8696a0;
        }

        #send-btn {
            background-color: #00a884; /* WhatsApp Green */
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
        }

        #send-btn:active {
            background-color: #008069;
        }
    </style>
</head>
<body>

    <header>
        <div class="avatar">🤖</div>
        <div class="app-info">
            <h1>Tech</h1>
            <p>Online</p>
        </div>
    </header>

    <main id="chat-container">
        <div class="message tech">
            <div class="avatar">🤖</div>
            <div class="bubble">
                Sasa Abdi! Maze niko rada kabisa. Mimi ni Tech, your personal assistant. Tunajenga nini leo? Tuanze na hii interface kwanza, sawa?
            </div>
        </div>
    </main>

    <footer>
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn" onclick="sendMessage()">▶</button>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');

        // Function to send a message (UI only for now)
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text === '') return;

            // 1. Add your message to the screen
            appendMessage(text, 'user', '👤');
            messageInput.value = ''; // Clear input

            // 2. Dummy response for now to test the look
            setTimeout(() => {
                appendMessage("Sawa Abdi, nimeona ujumbe wako. Bado hatujaunganisha API lakini interface iko safi!", 'tech', '🤖');
            }, 1000);
        }

        function appendMessage(text, sender, avatar) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);

            messageDiv.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="bubble">${text}</div>
            `;

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight; // Auto-scroll to bottom
        }

        // Allow sending with Enter key
        messageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
