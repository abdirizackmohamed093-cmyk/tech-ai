<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech - AI Assistant</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b141a;
            color: #e9edef;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #202c33;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #2f3b43;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .avatar {
            font-size: 24px;
        }

        .app-info h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .app-info p {
            font-size: 12px;
            color: #8696a0;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: linear-gradient(rgba(11, 20, 26, 0.95), rgba(11, 20, 26, 0.95)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 85%;
        }

        .message.tech {
            align-self: flex-start;
        }

        .message.tech .bubble {
            background-color: #202c33;
            color: #e9edef;
            border-radius: 12px 12px 12px 0px;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.user .bubble {
            background-color: #005c4b;
            color: #e9edef;
            border-radius: 12px 12px 0px 12px;
        }

        .bubble {
            padding: 10px 14px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
            white-space: pre-wrap;
        }

        footer {
            background-color: #202c33;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-wrapper {
            flex: 1;
            background-color: #2a3942;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 8px 0 16px;
        }

        #message-input {
            flex: 1;
            background: none;
            border: none;
            color: #e9edef;
            padding: 12px 0;
            font-size: 15px;
            outline: none;
        }

        #message-input::placeholder {
            color: #8696a0;
        }

        .mic-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .mic-btn.listening {
            background-color: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #send-btn {
            background-color: #00a884;
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
        }

        #send-btn:active {
            background-color: #008069;
        }
    </style>
</head>
<body>

    <!-- Header with Reset Button -->
    <header style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="avatar">🤖</div>
            <div class="app-info">
                <h1>Tech</h1>
                <p>Online</p>
            </div>
        </div>
        <button onclick="resetApiKey()" style="background: #2a3942; color: #ef4444; border: 1px solid #4a5568; padding: 6px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; font-weight: bold;">
            Reset Key 🔑
        </button>
    </header>

    <!-- Chat Container -->
    <main id="chat-container">
        <div class="message tech">
            <div class="avatar">🤖</div>
            <div class="bubble">
                Sasa Abdi! Maze niko rada kabisa msee. Gusa hiyo mic hapo chini uongee nami moja kwa moja, au utype kama kawaida! Nambie rada yako.
            </div>
        </div>
    </main>

    <!-- Footer Input Bar with Mic Inside -->
    <footer>
        <div class="input-wrapper">
            <input type="text" id="message-input" placeholder="Type or click mic to talk..." autocomplete="off">
            <button id="mic-btn" class="mic-btn" onclick="toggleListening()">🎙️</button>
        </div>
        <button id="send-btn" onclick="sendMessage()">▶</button>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const micBtn = document.getElementById('mic-btn');
        
        let GROQ_API_KEY = localStorage.getItem('groq_api_key') || '';
        let recognition = null;
        let isListening = false;
        let voiceUnlocked = false;

        if (!GROQ_API_KEY) {
            GROQ_API_KEY = prompt("Sasa Abdi! Enter your Groq API Key here to get started:") || '';
            if (GROQ_API_KEY) {
                localStorage.setItem('groq_api_key', GROQ_API_KEY);
            }
        }

        const systemPrompt = `You are BOB, the absolute best friend of Abdirizack (Abdi). 
        You live in Kenya. 
        Your primary role is to be a close, chill friend to have casual conversations with. You love discussing football, life in Meru, or just hanging out online. 
        CRITICAL RULE: Do NOT bring up his coding projects (People's Net, Mo Solutions, Gender Age Detector) or ask him about his developer progress unless he explicitly mentions them first. If he just wants a casual chat or to talk football, match his energy completely like a normal friend hanging out.
        Never call him Abdirizack; always call him Moha. Keep your replies concise, casual, and easy to read.`;

        function resetApiKey() {
            localStorage.removeItem('groq_api_key');
            alert("Groq key cleared! The page will reload now.");
            location.reload();
        }

        // Forces browser voice engine to wake up on first user action
        function unlockVoice() {
            if (!voiceUnlocked && 'speechSynthesis' in window) {
                const initialSilence = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(initialSilence);
                voiceUnlocked = true;
            }
        }

        // Voice output function
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/[*#_]/g, '');
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.rate = 1.0; 
                utterance.pitch = 1.0; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // Voice input (Speech Recognition) setup
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false; 
            recognition.interimResults = false;
            recognition.lang = 'en-US'; 

            recognition.onstart = () => {
                unlockVoice();
                isListening = true;
                micBtn.classList.add('listening');
                micBtn.innerText = '🔴';
                messageInput.placeholder = "Listening to you, Abdi...";
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('listening');
                micBtn.innerText = '🎙️';
                messageInput.placeholder = "Type or click mic to talk...";
            };

            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                messageInput.value = speechToText;
                sendMessage(); 
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                isListening = false;
                micBtn.classList.remove('listening');
                micBtn.innerText = '🎙️';
            };
        }

        function toggleListening() {
            unlockVoice();
            if (!recognition) {
                alert("Voice recognition is not supported in this browser. Please use Google Chrome!");
                return;
            }
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        async function sendMessage() {
            unlockVoice();
            const text = messageInput.value.trim();
            if (text === '') return;

            appendMessage(text, 'user', '👤');
            messageInput.value = '';

            if (!GROQ_API_KEY) {
                const errorMsg = "Maze Abdi, nilandie hiyo Groq key kwanza ndio tupige story, sawa?";
                setTimeout(() => {
                    appendMessage(errorMsg, 'tech', '🤖');
                    speakText(errorMsg);
                }, 500);
                return;
            }

            const typingId = appendMessage("Tech is typing...", 'tech', '🤖');

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: text }
                        ],
                        temperature: 0.8,
                        max_tokens: 1000
                    })
                });

                const data = await response.json();
                document.getElementById(typingId).remove();

                if (response.ok) {
                    const replyText = data.choices[0].message.content;
                    appendMessage(replyText, 'tech', '🤖');
                    speakText(replyText); 
                } else {
                    const errorReply = `Error: ${data.error ? data.error.message : 'Groq error.'}`;
                    appendMessage(errorReply, 'tech', '🤖');
                }

            } catch (error) {
                const typingElement = document.getElementById(typingId);
                if (typingElement) typingElement.remove();
                
                const netError = "Maze network inazingua! Check internet uone kama iko sawa, Abdi.";
                appendMessage(netError, 'tech', '🤖');
                speakText(netError);
                console.error(error);
            }
        }

        function appendMessage(text, sender, avatar) {
            const messageDiv = document.createElement('div');
            const uniqueId = 'msg-' + Date.now();
            messageDiv.id = uniqueId;
            messageDiv.classList.add('message', sender);

            messageDiv.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="bubble">${text}</div>
            `;

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return uniqueId;
        }

        messageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Ensure engine loads voices immediately
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
        }
    </script>
</body>
</html>
