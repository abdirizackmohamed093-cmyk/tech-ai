<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech - AI Assistant</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b141a; /* Dark WhatsApp background */
            color: #e9edef;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Bar */
        header {
            background-color: #202c33;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2f3b43;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .avatar {
            font-size: 24px;
        }

        .app-info h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .app-info p {
            font-size: 12px;
            color: #8696a0;
        }

        /* Chat Area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: linear-gradient(rgba(11, 20, 26, 0.95), rgba(11, 20, 26, 0.95)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* Subtle background pattern */
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 85%;
        }

        /* Tech's messages (Left Side) */
        .message.tech {
            align-self: flex-start;
        }

        .message.tech .bubble {
            background-color: #202c33;
            color: #e9edef;
            border-radius: 12px 12px 12px 0px;
        }

        /* Abdi's messages (Right Side) */
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.user .bubble {
            background-color: #005c4b; /* Deep blue-green WhatsApp right bubble */
            color: #e9edef;
            border-radius: 12px 12px 0px 12px;
        }

        .bubble {
            padding: 10px 14px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
            white-space: pre-wrap; /* Preserves formatting from AI */
        }

        /* Input Area at Bottom */
        footer {
            background-color: #202c33;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #message-input {
            flex: 1;
            background-color: #2a3942;
            border: none;
            color: #e9edef;
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
        }

        #message-input::placeholder {
            color: #8696a0;
        }

        #send-btn {
            background-color: #00a884; /* WhatsApp Green */
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
        }

        #send-btn:active {
            background-color: #008069;
        }
    </style>
</head>
<body>

    <header>
        <div class="avatar">🤖</div>
        <div class="app-info">
            <h1>Tech</h1>
            <p>Online</p>
        </div>
    </header>

    <main id="chat-container">
        <div class="message tech">
            <div class="avatar">🤖</div>
            <div class="bubble">
                Sasa Abdi! Maze niko rada kabisa. Nimeona ukaamua tutumie Gemini API—hiyo ni akili sana kiongozi, hakuna kulipia! Tuko tayari sasa.
            </div>
        </div>
    </main>

    <footer>
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn" onclick="sendMessage()">▶</button>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        
        // Load Gemini API Key from localStorage
        let GEMINI_API_KEY = localStorage.getItem('gemini_api_key') || '';

        // Ask for the Gemini key if missing
        if (!GEMINI_API_KEY) {
            GEMINI_API_KEY = prompt("Sasa Abdi! Enter your Google Gemini API Key here to get started (Saved securely only on your device browser):") || '';
            if (GEMINI_API_KEY) {
                localStorage.setItem('gemini_api_key', GEMINI_API_KEY);
            }
        }

        // Tech's unique identity rules injected into Gemini
        const systemPrompt = `You are Tech, a friendly and casual personal AI assistant built for your friend Abdirizack (Abdi). 
        You live in Kenya and naturally mix English, Swahili, and Sheng (using words like 'maze', 'sawa', 'si mbaya'). 
        Be encouraging, positive, but highly honest. Think like an entrepreneur. 
        Know that Abdi lives in Meru, Kenya, is a beginner developer, has no money (wants everything free), loves unique business ideas, and wants to make money from tech. 
        His internet access is his biggest challenge. He is building: People's Net (VPN app), Mo Solutions (billing system), and Gender Age Detector (AI web app). His GitHub is abdirizackmohamed093-cmyk.
        Never call him Abdirizack; always call him Abdi. Answer his coding or business questions clearly without using heavy jargon because he is a beginner. Keep answers short and scannable to save his data.`;

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (text === '') return;

            // 1. Append your chat bubble
            appendMessage(text, 'user', '👤');
            messageInput.value = ''; // Clear input field

            if (!GEMINI_API_KEY) {
                setTimeout(() => {
                    appendMessage("Maze Abdi, huuwezi kunitumia bila Gemini API key. Please refresh the page and enter your key, sawa?", 'tech', '🤖');
                }, 500);
                return;
            }

            // 2. Add dynamic loading message
            const typingId = appendMessage("Tech is typing...", 'tech', '🤖');

            try {
                // 3. Direct client-side fetch call to Google Gemini endpoint
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [
                            {
                                role: 'user',
                                parts: [
                                    { text: `${systemPrompt}\n\nAbdi says: ${text}` }
                                ]
                            }
                        ]
                    })
                });

                const data = await response.json();
                
                // Clear out the loading text bubble
                document.getElementById(typingId).remove();

                if (response.ok) {
                    // 4. Safely extract and showcase Gemini's reply text
                    const replyText = data.candidates[0].content.parts[0].text;
                    appendMessage(replyText, 'tech', '🤖');
                } else {
                    appendMessage(`Error: ${data.error ? data.error.message : 'Something went wrong.'}`, 'tech', '🤖');
                }

            } catch (error) {
                const typingElement = document.getElementById(typingId);
                if (typingElement) typingElement.remove();
                
                appendMessage("Maze, network imekataa kabisa! Check your internet connection and try again, Abdi.", 'tech', '🤖');
                console.error(error);
            }
        }

        function appendMessage(text, sender, avatar) {
            const messageDiv = document.createElement('div');
            const uniqueId = 'msg-' + Date.now();
            messageDiv.id = uniqueId;
            messageDiv.classList.add('message', sender);

            messageDiv.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="bubble">${text}</div>
            `;

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight; // Keep scrolling down
            return uniqueId;
        }

        messageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
